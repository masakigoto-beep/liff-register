<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE登録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    .header {
      background: #06C755;
      padding: 14px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
    }

    .content {
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .profile-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #D8F3E5;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 22px;
    }
    .profile-name { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .profile-id { font-size: 11px; color: #888; word-break: break-all; }

    .form-section {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .form-section h2 { font-size: 13px; color: #888; font-weight: 500; }

    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 13px; font-weight: 500; color: #444; }
    .input-group input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      font-size: 15px;
      color: #111;
      outline: none;
    }
    .input-group input:focus {
      border-color: #06C755;
      box-shadow: 0 0 0 3px rgba(6,199,85,0.12);
    }

    .notice {
      background: #EAF9EF;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      font-size: 13px;
      color: #0F6E56;
      line-height: 1.5;
    }

    .btn-register {
      width: 100%;
      height: 52px;
      background: #06C755;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-register:active { opacity: 0.88; transform: scale(0.98); }

    #status { font-size: 13px; color: #888; text-align: center; padding: 4px 0; }
  </style>
</head>
<body>

<div class="header">
  <h1>利用者登録</h1>
</div>

<div class="content">
  <div class="profile-card">
    <div class="avatar">👤</div>
    <div>
      <div class="profile-name" id="display-name">読み込み中...</div>
      <div class="profile-id" id="user-id"></div>
    </div>
  </div>

  <div class="form-section">
    <h2>登録情報</h2>
    <div class="input-group">
      <label for="name">お名前</label>
      <input type="text" id="name" placeholder="例：山田 花子" />
    </div>
    <div class="notice">
      ℹ️ LINEアカウントと紐づけて登録します。
    </div>
  </div>

  <button class="btn-register" onclick="submitForm()">登録する</button>
  <p id="status"></p>
</div>

<script>
const LIFF_ID = "2010188905-GwlRifFS";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyLCdiRa-8eCJK0zigOcR1WuNVUVb4nJLu_JiO8J9zawIW_MLRRNRAogP0B5RILi2e9zQ/exec";
let userProfile = null;

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    userProfile = await liff.getProfile();
    document.getElementById("display-name").textContent = userProfile.displayName;
    document.getElementById("user-id").textContent = "ID: " + userProfile.userId;
  } catch(err) {
    document.getElementById("status").textContent = err.message;
  }
}
main();

async function submitForm() {
  try {
    const payload = {
      name: document.getElementById("name").value,
      line_user_id: userProfile.userId,
      display_name: userProfile.displayName
    };
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    document.getElementById("status").textContent = "✅ 登録完了";
    liff.closeWindow();
  } catch(err) {
    document.getElementById("status").textContent = err.message;
  }
}
</script>
</body>
</html>
