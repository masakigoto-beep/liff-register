<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>LINE登録</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>利用者登録</h2>

<input
  type="text"
  id="name"
  placeholder="名前"
/>

<button onclick="submitForm()">
  登録
</button>

<p id="status">
読み込み中...
</p>

<script>

const LIFF_ID =
  "2010188905-GwlRifFS";

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbyJBIBaZvcpxIiYbGJc82I4ScUEuPNG64h6olll5-X5kno_7ojBOPNPoKhV6FWBQFEbPA/exec";

let userProfile = null;

async function main() {

  try {

    await liff.init({
      liffId: LIFF_ID
    });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    userProfile = await liff.getProfile();

    document.getElementById("status").innerHTML = `
      こんにちは ${userProfile.displayName}<br>
      LINE ID: ${userProfile.userId}
    `;

  } catch(err) {

    document.getElementById("status").innerText =
      err.message;
  }
}

main();

async function submitForm() {

  try {

    const payload = {

      name: document.getElementById("name").value,

      line_user_id: userProfile.userId,

      display_name: userProfile.displayName
    };

    await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    document.getElementById("status").innerText =
      "登録完了";

    liff.closeWindow();

  } catch(err) {

    document.getElementById("status").innerText =
      err.message;
  }
}

</script>

</body>
</html>
