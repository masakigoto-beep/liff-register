<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>LINE登録</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>利用者登録</h2>

<input
  type="text"
  id="name"
  placeholder="名前"
/>

<button onclick="submitForm()">
  登録
</button>

<p id="status">
読み込み中...
</p>

<script>

const LIFF_ID =
  "2010188905-a0B6A3Vl";

const GAS_URL =
  "ここにGAS_URL";

async function main() {

  try {

    await liff.init({
      liffId: LIFF_ID
    });

    if (!liff.isLoggedIn()) {

      liff.login();

      return;
    }

    const profile =
      await liff.getProfile();

    document
      .getElementById("status")
      .innerText =
        `こんにちは ${profile.displayName}`;

  } catch(err) {

    document
      .getElementById("status")
      .innerText =
        err.message;
  }
}

main();

async function submitForm() {

  try {

    const profile =
      await liff.getProfile();

    const payload = {

      name:
        document
          .getElementById("name")
          .value,

      line_user_id:
        profile.userId,

      display_name:
        profile.displayName
    };

    await fetch(
      GAS_URL,
      {
        method: "POST",

        headers: {
          "Content-Type":
            "application/json"
        },

        body:
          JSON.stringify(payload)
      }
    );

    document
      .getElementById("status")
      .innerText =
        "登録完了";

    liff.closeWindow();

  } catch(err) {

    document
      .getElementById("status")
      .innerText =
        err.message;
  }
}

</script>

</body>
</html>ß
